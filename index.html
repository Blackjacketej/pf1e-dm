    <script>
      // Register service worker for offline support (resolves relative to base)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          var base = document.querySelector('base')?.href || new URL('./', location.href).href;
          navigator.serviceWorker.register(new URL('sw.js', base).href).catch(function(){});
        });
      }
    </script>
